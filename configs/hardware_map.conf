# =============================================================================
# HARDWARE MAP: hardware_map.conf
# Maps detected board codename to its config layer chain
#
# Config is built in THREE layers (later layers override earlier ones):
#   Layer 1 (BASE):     configs/base/chromebooks-x86_64.cfg    (always applied)
#   Layer 2 (PLATFORM): configs/platform/<platform>.cfg         (SoC family)
#   Layer 3 (DEVICE):   configs/device/<codename>.cfg           (board overrides)
#
# Format: CODENAME|PLATFORM|KERNEL_SERIES|PATCH_DIR|ARCH|DTB_PREFIX|NOTES
#
# PLATFORM values map to configs/platform/<platform>.cfg
# CODENAME values map to configs/device/<codename>.cfg (may not exist = no overrides)
# KERNEL_SERIES: "default" (reads DEFAULT_SERIES from kernel_versions.conf)
#                or explicit series e.g. "6.12" to override for this board only
# PATCH_DIR: directory under patches/ (or "none")
# ARCH: x86_64 or arm64
# DTB_PREFIX: glob prefix for DTB copy e.g. mt8183-kukui, mt8173-elm (arm64 only, use "none" for x86_64)
#
# Comment out lines to exclude devices from automated builds.
# The build matrix deduplicates by platform so only one build job
# runs per platform regardless of how many devices share it.
# =============================================================================

