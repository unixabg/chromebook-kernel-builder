# =============================================================================
# PLATFORM CONFIG FRAGMENT: Intel Braswell (Strago family)
# Chromebook families: STRAGO
# SOC: Intel Celeron N3xxx / Pentium N37xx (Braswell, GEN8 GT1)
# Boards: relm, setzer, gnawty, banon, celes, edgar, kefka, reks, terra,
#         ultima, wizpig, cyan, kasper
#
# AUDIO: Braswell supports both SST and SOF paths on 6.12+
#   WeirdTreeThing setup-audio will prompt which to use.
#   Key: SOF_ACPI must be DISABLED. Only SOF_INTEL_ATOM_HIFI_EP is needed.
#
# VALIDATED AGAINST: two independent working relm (CTL NL61) kernel configs
# both producing identical results. Critical findings vs first attempt:
#   - DRM_I915 must be =m (built-in causes software rendering, unusable perf)
#   - X86_INTEL_PSTATE=y mandatory (CPU stuck at 800MHz without it)
#   - INTEL_TURBO_MAX_3=y mandatory for boost
#   - Full ACPI processor chain mandatory for C-states
#   - Full THERMAL subsystem mandatory (was missing entirely)
#   - CHROMEOS_ACPI=m mandatory for Chromebook EC
#   - SND_SOC_SOF_ACPI must be disabled
#   - SND_SOC_SOF_INTEL_ATOM_HIFI_EP=m is the correct SOF entry point
#   - HZ_250 and PREEMPT_VOLUNTARY match both working configs
# =============================================================================

# --- Intel GPU: GEN8 GT1 (Braswell) ---
# MUST be =m - built-in causes GPU init failure, falls back to software
# rendering making the system completely unusable
CONFIG_DRM_I915=m
CONFIG_DRM_I915_CAPTURE_ERROR=y
CONFIG_DRM_I915_COMPRESS_ERROR=y
CONFIG_DRM_I915_USERPTR=y
CONFIG_DRM_I915_GVT=y
CONFIG_DRM_I915_GVT_KVMGT=m
CONFIG_DRM_I915_PXP=y
CONFIG_DRM_I915_DP_TUNNEL=y
CONFIG_DRM_I915_REQUEST_TIMEOUT=20000
CONFIG_DRM_I915_FENCE_TIMEOUT=10000
CONFIG_DRM_I915_USERFAULT_AUTOSUSPEND=250
CONFIG_DRM_I915_HEARTBEAT_INTERVAL=2500
CONFIG_DRM_I915_PREEMPT_TIMEOUT=640
CONFIG_DRM_I915_PREEMPT_TIMEOUT_COMPUTE=7500
CONFIG_DRM_I915_MAX_REQUEST_BUSYWAIT=8000
CONFIG_DRM_I915_STOP_TIMEOUT=100
CONFIG_DRM_I915_TIMESLICE_DURATION=1

# --- CPU frequency scaling ---
# intel_pstate is the primary driver - without it CPU cannot boost
# ACPI_CPUFREQ kept as fallback, both present in both working configs
CONFIG_X86_INTEL_PSTATE=y
CONFIG_X86_PCC_CPUFREQ=m
CONFIG_X86_ACPI_CPUFREQ=m
CONFIG_X86_ACPI_CPUFREQ_CPB=y
CONFIG_X86_SPEEDSTEP_CENTRINO=m
CONFIG_X86_SPEEDSTEP_LIB=m
CONFIG_CPU_FREQ_GOV_POWERSAVE=m
CONFIG_INTEL_IDLE=y
CONFIG_INTEL_TURBO_MAX_3=y
CONFIG_ACPI_CPU_FREQ_PSS=y

# --- ACPI core ---
CONFIG_ACPI=y
CONFIG_ACPI_LEGACY_TABLES_LOOKUP=y
CONFIG_ACPI_SYSTEM_POWER_STATES_SUPPORT=y
CONFIG_ACPI_TABLE_LIB=y
CONFIG_ACPI_THERMAL_LIB=y
CONFIG_ACPI_SPCR_TABLE=y
CONFIG_ACPI_LPIT=y
CONFIG_ACPI_SLEEP=y
CONFIG_ACPI_REV_OVERRIDE_POSSIBLE=y
CONFIG_ACPI_EC_DEBUGFS=y
CONFIG_ACPI_AC=m
CONFIG_ACPI_BATTERY=m
CONFIG_ACPI_BUTTON=m
CONFIG_ACPI_VIDEO=m
CONFIG_ACPI_FAN=m
CONFIG_ACPI_TAD=m
CONFIG_ACPI_DOCK=y
CONFIG_ACPI_NHLT=y
CONFIG_ACPI_NFIT=m
CONFIG_ACPI_NUMA=y
CONFIG_ACPI_HMAT=y
CONFIG_ACPI_PCI_SLOT=y
CONFIG_ACPI_CONTAINER=y
CONFIG_ACPI_HOTPLUG_MEMORY=y
CONFIG_ACPI_HOTPLUG_IOAPIC=y
CONFIG_ACPI_SBS=m
CONFIG_ACPI_HED=y
CONFIG_ACPI_BGRT=y
CONFIG_ACPI_WATCHDOG=y
CONFIG_ACPI_EXTLOG=y
CONFIG_ACPI_ADXL=y
CONFIG_ACPI_PCC=y
CONFIG_ACPI_VIOT=y
CONFIG_ACPI_PRMT=y
CONFIG_ACPI_WMI=m
CONFIG_ACPI_ALS=m
CONFIG_ACPI_PLATFORM_PROFILE=m
CONFIG_ACPI_TABLE_UPGRADE=y
CONFIG_ACPI_I2C_OPREGION=y
CONFIG_ACPI_MADT_WAKEUP=y
CONFIG_PNPACPI=y
CONFIG_HOTPLUG_PCI_ACPI=y
CONFIG_ATA_ACPI=y

# --- ACPI processor / C-states / idle ---
CONFIG_ACPI_PROCESSOR=y
CONFIG_ACPI_PROCESSOR_CSTATE=y
CONFIG_ACPI_PROCESSOR_IDLE=y
CONFIG_ACPI_PROCESSOR_AGGREGATOR=m
CONFIG_ACPI_HOTPLUG_CPU=y
CONFIG_ACPI_CPPC_LIB=y
CONFIG_ACPI_THERMAL=y

# --- ACPI error / platform ---
CONFIG_HAVE_ACPI_APEI=y
CONFIG_HAVE_ACPI_APEI_NMI=y
CONFIG_ACPI_APEI=y
CONFIG_ACPI_APEI_GHES=y
CONFIG_ACPI_APEI_PCIEAER=y
CONFIG_ACPI_APEI_MEMORY_FAILURE=y
CONFIG_ACPI_APEI_EINJ=m

# --- Thermal management ---
# Was missing entirely from first attempt - caused unmanaged throttling
CONFIG_THERMAL=y
CONFIG_THERMAL_NETLINK=y
CONFIG_THERMAL_STATISTICS=y
CONFIG_THERMAL_EMERGENCY_POWEROFF_DELAY_MS=0
CONFIG_THERMAL_HWMON=y
CONFIG_THERMAL_DEFAULT_GOV_STEP_WISE=y
CONFIG_THERMAL_GOV_FAIR_SHARE=y
CONFIG_THERMAL_GOV_STEP_WISE=y
CONFIG_THERMAL_GOV_BANG_BANG=y
CONFIG_THERMAL_GOV_USER_SPACE=y
CONFIG_THERMAL_GOV_POWER_ALLOCATOR=y
CONFIG_DEVFREQ_THERMAL=y
CONFIG_INTEL_POWERCLAMP=m
CONFIG_X86_THERMAL_VECTOR=y
CONFIG_X86_PKG_TEMP_THERMAL=m
CONFIG_INTEL_SOC_DTS_THERMAL=m
CONFIG_INT340X_THERMAL=m
CONFIG_ACPI_THERMAL_REL=m
CONFIG_INT3406_THERMAL=m
CONFIG_PROC_THERMAL_MMIO_RAPL=m
CONFIG_INTEL_BXT_PMIC_THERMAL=m
CONFIG_INTEL_PCH_THERMAL=m
CONFIG_INTEL_HFI_THERMAL=y
CONFIG_POWERCAP=y
CONFIG_ENERGY_MODEL=y

# --- Intel LPSS ---
CONFIG_X86_INTEL_LPSS=y
CONFIG_MFD_INTEL_LPSS=m
CONFIG_MFD_INTEL_LPSS_ACPI=m
CONFIG_MFD_INTEL_LPSS_PCI=m
CONFIG_SERIAL_8250_LPSS=m
CONFIG_I2C_DESIGNWARE_BAYTRAIL=y
CONFIG_PINCTRL_BAYTRAIL=y
CONFIG_GPIO_ACPI=y
CONFIG_PWM_LPSS=m
CONFIG_PWM_LPSS_PLATFORM=m
CONFIG_I2C_HID_ACPI=m
CONFIG_MMC_SDHCI_ACPI=m

# --- Intel CHT PMIC ---
CONFIG_CHTCRC_PMIC_OPREGION=y
CONFIG_CHT_WC_PMIC_OPREGION=y
CONFIG_CHT_DC_TI_PMIC_OPREGION=y
CONFIG_INTEL_SOC_PMIC_CHTWC=y
CONFIG_INTEL_SOC_PMIC_CHTDC_TI=m
CONFIG_I2C_CHT_WC=m
CONFIG_EXTCON_INTEL_CHT_WC=m
CONFIG_INTEL_CHTWC_INT33FE=m
CONFIG_XPOWER_PMIC_OPREGION=y

# --- Chromebook specific ---
CONFIG_CHROMEOS_ACPI=m

# --- AtomISP camera ---
CONFIG_INTEL_ATOMISP2_PDX86=y
CONFIG_INTEL_ATOMISP2_PM=m
CONFIG_INTEL_TPMI_POWER_DOMAINS=m

# --- Scheduler / timer ---
# Both working configs use HZ_250 and PREEMPT_VOLUNTARY
# x86_64 defconfig defaults to HZ_300 - explicitly override here
CONFIG_HZ_250=y
CONFIG_PREEMPT_VOLUNTARY=y
CONFIG_PREEMPT_DYNAMIC=y
CONFIG_CGROUPS=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_RDMA=y
CONFIG_CGROUP_HUGETLB=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_PERF=y
CONFIG_CGROUP_BPF=y
CONFIG_CGROUP_MISC=y
CONFIG_BLK_CGROUP=y
CONFIG_BLK_CGROUP_IOCOST=y

# --- Audio: SST path ---
CONFIG_SND=y
CONFIG_SND_SOC=y
CONFIG_SND_SOC_ACPI=m
CONFIG_SND_SOC_ACPI_INTEL_MATCH=m
CONFIG_SND_INTEL_SOUNDWIRE_ACPI=m
CONFIG_SND_SOC_INTEL_SST_TOPLEVEL=y
CONFIG_SND_SOC_INTEL_CATPT=m
CONFIG_SND_SST_ATOM_HIFI2_PLATFORM=m
CONFIG_SND_SST_ATOM_HIFI2_PLATFORM_ACPI=m

# --- Audio: SOF Atom path ---
# SOF_ACPI must be DISABLED - confirmed in both working relm configs
# Only ATOM_HIFI_EP needed as SOF entry point for Braswell
# CONFIG_SND_SOC_SOF_ACPI is not set
CONFIG_SND_SOC_SOF_TOPLEVEL=y
CONFIG_SND_SOC_SOF=m
CONFIG_SND_SOC_SOF_INTEL_TOPLEVEL=y
CONFIG_SND_SOC_SOF_INTEL_ATOM_HIFI_EP=m
CONFIG_SND_SOC_SOF_INTEL_COMMON=m
CONFIG_SND_SOC_SOF_CLIENT=m
CONFIG_SND_SOC_SOF_IPC3=y
CONFIG_SND_SOC_SOF_IPC4=y

# --- Audio: Intel machine drivers ---
CONFIG_SND_SOC_INTEL_MACH=y
CONFIG_SND_SOC_INTEL_SST=m
CONFIG_SND_SOC_INTEL_SST_ACPI=m
CONFIG_SND_SOC_INTEL_CHT_BSW_RT5645_MACH=m
CONFIG_SND_SOC_INTEL_CHT_BSW_RT5672_MACH=m
CONFIG_SND_SOC_INTEL_CHT_BSW_MAX98090_TI_MACH=m
CONFIG_SND_SOC_INTEL_CHT_BSW_NAU8824_MACH=m
CONFIG_SND_SOC_INTEL_BYTCR_RT5640_MACH=m
CONFIG_SND_SOC_INTEL_BYTCR_RT5651_MACH=m
CONFIG_SND_SOC_INTEL_BYT_CHT_CX2072X_MACH=m
CONFIG_SND_SOC_INTEL_BYT_CHT_DA7213_MACH=m
CONFIG_SND_SOC_INTEL_BYT_CHT_ES8316_MACH=m
CONFIG_SND_SOC_INTEL_AVS=m

# --- Audio: Codecs ---
CONFIG_SND_SOC_RT5645=m
CONFIG_SND_SOC_MAX98090=m
CONFIG_SND_SOC_NAU8824=m
CONFIG_SND_SOC_DMIC=m

# --- Audio: HDA (HDMI) ---
CONFIG_SND_HDA_INTEL=m
CONFIG_SND_HDA_CODEC_REALTEK=m
CONFIG_SND_HDA_POWER_SAVE_DEFAULT=10
CONFIG_SND_SOC_SOF_HDA_COMMON=m
CONFIG_SND_SOC_SOF_HDA_LINK=y
CONFIG_SND_SOC_SOF_HDA_AUDIO_CODEC=y
CONFIG_SND_SOC_SOF_HDA_LINK_BASELINE=m
CONFIG_SND_SOC_SOF_HDA=m
CONFIG_SND_AC97_POWER_SAVE=y
CONFIG_SND_AC97_POWER_SAVE_DEFAULT=0
