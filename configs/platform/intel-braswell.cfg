# =============================================================================
# PLATFORM CONFIG FRAGMENT: Intel Braswell (Strago family)
# Chromebook families: STRAGO
# SOC: Intel Celeron N3xxx / Pentium N37xx (Braswell, GEN8 GT1)
# Boards: relm, setzer, gnawty, banon, celes, edgar, kefka, reks, terra,
#         ultima, wizpig, cyan, kasper, lulu (some lulu is Broadwell)
#
# AUDIO NOTE: Braswell uses Intel CHT (CherryTrail) SST audio path,
# NOT SOF. The driver is snd_soc_sst_cht_bsw_rt5645 or cht_bsw_rt5650
# depending on the codec. SOF is NOT applicable here.
#
# Two codec variants exist across the Strago family:
#   RT5650/RT5654 (chtrt5650) - relm, setzer, edgar, celes, reks, terra, banon
#   MAX98090 (chtmax98090)    - cyan, gnawty, kasper
# The device config fragment selects the correct one per board.
# =============================================================================

# --- Intel GPU: GEN8 GT1 (Braswell) uses i915 ---
CONFIG_DRM_I915=y

# --- Intel SST audio (Braswell/CherryTrail path) ---
# These replace SOF for this generation - do NOT enable SOF for Braswell
CONFIG_SND=y
CONFIG_SND_SOC=y
CONFIG_SND_SST_ATOM_HIFI2_PLATFORM=m
CONFIG_SND_SOC_INTEL_SST=m
CONFIG_SND_SOC_INTEL_SST_ACPI=m

# --- CHT BSW machine drivers - both variants included at platform level ---
# Device fragment will confirm which codec is actually present
CONFIG_SND_SOC_INTEL_CHT_BSW_RT5645_MACH=m   # covers RT5645 and RT5650/5654
CONFIG_SND_SOC_INTEL_CHT_BSW_MAX98090_TI_MACH=m
CONFIG_SND_SOC_INTEL_CHT_BSW_NAU8824_MACH=m

# --- Codecs: both variants ---
CONFIG_SND_SOC_RT5645=m    # RT5645/RT5650/RT5654 share this driver
CONFIG_SND_SOC_MAX98090=m
CONFIG_SND_SOC_NAU8824=m

# --- HDA fallback (some boards expose HDA as well) ---
CONFIG_SND_HDA_INTEL=m
CONFIG_SND_HDA_CODEC_REALTEK=m

# --- DMIC (internal microphone on Braswell) ---
CONFIG_SND_SOC_DMIC=m

# --- Intel LPSS (required for I2C/SPI to codec) ---
CONFIG_X86_INTEL_LPSS=y
CONFIG_MFD_INTEL_LPSS_ACPI=m
CONFIG_I2C_DESIGNWARE_PLATFORM=m
CONFIG_I2C_DESIGNWARE_BAYTRAIL=m   # shared BYT/BSW driver

# --- Intel idle / power ---
CONFIG_INTEL_IDLE=y
CONFIG_INTEL_SOC_PMIC=y
CONFIG_INTEL_SOC_PMIC_CHTWC=m

# --- Explicitly disable SOF for Braswell - not applicable ---
# CONFIG_SND_SOC_SOF_INTEL_TOPLEVEL is not set
# CONFIG_SND_SOC_SOF is not set
