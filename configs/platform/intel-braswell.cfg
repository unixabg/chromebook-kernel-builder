# Intel Braswell platform config
# Board: STRAGO family (Gnawty, Relm, Setzer, Celes, Banon, etc.)
# SoC: Intel Celeron N3xxx / Pentium N37xx (Braswell, Cherry Trail Atom)
# GPU: Intel Gen8 (i915)
# Audio: Intel CHT SST / SOF BYT+CHT path (covered by base SOF options)
# WiFi: Intel iwlwifi (covered by base)
#
# Known limitation: Internal microphone non-functional on some boards
# due to ChromeOS EC quirk - documented, not a kernel config issue.

# ── GPU: Intel Gen8 (i915) ────────────────────────────────────────────────────
CONFIG_DRM_I915=m
CONFIG_DRM_I915_CAPTURE_ERROR=y
CONFIG_DRM_I915_COMPRESS_ERROR=y
CONFIG_DRM_I915_USERPTR=y
CONFIG_DRM_I915_GVT=y

# ── CPU frequency: Intel P-state ─────────────────────────────────────────────
CONFIG_X86_INTEL_PSTATE=y
CONFIG_INTEL_IDLE=y
CONFIG_INTEL_TURBO_MAX_3=y
# CONFIG_X86_ACPI_CPUFREQ is not set

# ── Cherry Trail / Braswell platform devices ──────────────────────────────────
# LPSS (Low Power Subsystem) - serial, SPI, I2C on CHT
CONFIG_MFD_INTEL_LPSS=y
CONFIG_SERIAL_8250_LPSS=y
CONFIG_PWM_LPSS=m
CONFIG_PWM_LPSS_PLATFORM=m

# Cherry Trail PMIC and power management
CONFIG_INTEL_SOC_PMIC_CHTWC=m
CONFIG_INTEL_SOC_PMIC_CHTDC_TI=m
CONFIG_CHT_WC_PMIC_OPREGION=y
CONFIG_CHT_DC_TI_PMIC_OPREGION=y
CONFIG_CHTCRC_PMIC_OPREGION=y
CONFIG_I2C_CHT_WC=m
CONFIG_EXTCON_INTEL_CHT_WC=m
CONFIG_INTEL_CHTWC_INT33FE=m
CONFIG_XPOWER_PMIC_OPREGION=y

# Cherry Trail thermal
CONFIG_INTEL_BXT_PMIC_THERMAL=m
CONFIG_INTEL_PCH_THERMAL=m
CONFIG_INT340X_THERMAL=m
CONFIG_ACPI_THERMAL_REL=m
CONFIG_INT3406_THERMAL=m

# ── Audio: Braswell SST legacy path ───────────────────────────────────────────
# Base config disables SST ACPI in favour of SOF. Re-enable for Braswell
# boards that use the legacy SST firmware path.
CONFIG_SND_SST_ATOM_HIFI2_PLATFORM=m
CONFIG_SND_SST_ATOM_HIFI2_PLATFORM_ACPI=m
CONFIG_SND_HDA_INTEL=m
CONFIG_SND_INTEL_SOUNDWIRE_ACPI=m

# ── Camera: Intel AtomISP2 (Braswell/CHT camera subsystem) ───────────────────
CONFIG_INTEL_ATOMISP2_PDX86=m
CONFIG_INTEL_ATOMISP2_PM=m

# ── USB-C / power delivery ────────────────────────────────────────────────────
CONFIG_TYPEC=m
CONFIG_TYPEC_UCSI=m
CONFIG_UCSI_ACPI=m
