# =============================================================================
# PLATFORM CONFIG FRAGMENT: AMD Ryzen (Zork family - Picasso/Dali/Renoir)
# Chromebook families: ZORK (Morphius, Dalboz, Vilboz, Woomax, etc.)
# SOC: AMD Ryzen 3000/4000 series (Picasso=Zen+, Dali=Zen, Renoir=Zen2)
# =============================================================================

# --- AMD GPU: module is fine for Zork (no DW I2S dependency) ---
CONFIG_DRM_AMDGPU=m
CONFIG_DRM_AMD_DC=y
CONFIG_DRM_AMD_DC_DCN=y
CONFIG_HSA_AMD=y

# --- Audio: SOF with AMD Renoir ACP backend ---
CONFIG_SND_SOC_SOF_AMD_COMMON=m
CONFIG_SND_SOC_SOF_AMD_RENOIR=m
CONFIG_SND_SOC_AMD_ACP3x=m
CONFIG_SND_SOC_AMD_RENOIR=m
CONFIG_SND_SOC_AMD_REMBRANDT=m
CONFIG_SND_SOC_AMD_RPL_ACP6x=m

# --- AMD ACP machine drivers ---
CONFIG_SND_SOC_AMD_SOF_MACH=m
CONFIG_SND_SOC_AMD_LEGACY_MACH=m

# --- Codecs on Zork boards ---
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_RT5682=m
CONFIG_SND_SOC_RT5682S=m
CONFIG_SND_SOC_NAU8825=m
CONFIG_SND_SOC_CS42L42=m
CONFIG_SND_SOC_DA7219=m

# --- AMD power ---
CONFIG_X86_AMD_PSTATE=y
CONFIG_AMD_IOMMU=y
CONFIG_ACPI_CPPC_LIB=y

# No built-in firmware required for Zork (SOF loads fine from initrd)
# CONFIG_EXTRA_FIRMWARE is intentionally left unset at this level
