# =============================================================================
# PLATFORM CONFIG FRAGMENT: AMD Stoneyridge (GCN 3, Carrizo/Bristol Ridge)
# Chromebook families: GRUNT (Aleena, Barla, Careena, Kasumi, etc.)
#
# CRITICAL REQUIREMENTS for audio (WeirdTreeThing/chromebook-linux-audio):
#   1. DRM_AMDGPU must be =y (built-in), NOT =m
#      Reason: the audio path through AMDGPU depends on the GPU driver being
#              initialized before the sound/soc/dwc I2S driver probes. When
#              AMDGPU is a module, the probe ordering is non-deterministic at
#              boot and the DW I2S controller never gets its BCLK.
#   2. The amdgpu/stoney_* firmware blobs must be compiled INTO the kernel
#      (CONFIG_EXTRA_FIRMWARE) rather than loaded from /lib/firmware.
#      Reason: same ordering issue - firmware must be available before initrd.
#   3. Revert/don't apply the 2 latest commits in sound/soc/dwc that broke
#      this (apply patches/platform/amd-stoneyridge/0001-revert-dwc-i2s.patch)
# =============================================================================

# --- AMD GPU: MUST be built-in (=y), not module (=m) ---
CONFIG_DRM_AMDGPU=y
# Disable Intel GPU if this is a pure AMD platform
# CONFIG_DRM_I915 is not set

# --- AMDGPU IP blocks needed for Stoney ---
CONFIG_DRM_AMDGPU_SI=y
CONFIG_DRM_AMDGPU_CIK=y
CONFIG_HSA_AMD=y

# --- AMD display (DC) ---
CONFIG_DRM_AMD_DC=y
CONFIG_DRM_AMD_DC_DCN=y
CONFIG_DRM_AMD_ACP=y

# --- Audio: DesignWare I2S - MUST be built-in for Stoneyridge ---
# The DW I2S controller carries audio from the APU to the codec.
# Must be =y so it's available before module loading order becomes an issue.
# SND and SND_SOC must also be =y — if their parent subsystems are =m then
# olddefconfig will demote all children to =m regardless of what we request.
CONFIG_SND=y
CONFIG_SND_SOC=y
CONFIG_SND_DESIGNWARE_I2S=y
CONFIG_SND_SOC_DESIGNWARE_I2S=y

# --- Audio: AMD ACP (Audio Co-Processor) for Stoney ---
CONFIG_SND_SOC_AMD_ACP=m
CONFIG_SND_SOC_AMD_CZ_DA7219MX98357_MACH=m
CONFIG_SND_SOC_AMD_CZ_RT5645_MACH=m

# --- Codecs present on Stoneyridge Chromebooks ---
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_RT5645=m

# --- FIRMWARE BUILT-IN: stoney GPU blobs required before initrd ---
# These must match files present in the kernel source tree's firmware dir
# or in EXTRA_FIRMWARE_DIR pointing to /lib/firmware on the build host.
# List all stoney_*.bin files needed:
CONFIG_EXTRA_FIRMWARE="amdgpu/stoney_ce.bin amdgpu/stoney_me.bin amdgpu/stoney_mec.bin amdgpu/stoney_pfp.bin amdgpu/stoney_rlc.bin amdgpu/stoney_sdma.bin amdgpu/stoney_uvd.bin amdgpu/stoney_vce.bin"
CONFIG_EXTRA_FIRMWARE_DIR="/lib/firmware"

# --- eMMC: Stoneyridge eMMC only detected on cold boot without this patch ---
# (handled by patch 0002-emmc-coldboot.patch in patches/platform/amd-stoneyridge)
CONFIG_MMC_SDHCI_ACPI=y

# --- AMD power / SMU ---
CONFIG_X86_AMD_PSTATE=y
CONFIG_AMD_IOMMU=y
CONFIG_AMD_IOMMU_V2=m

# --- GPU power features ---
CONFIG_VEGA10_SMUMGR=y

# --- Disable SOF for AMD Stoney (uses ACP path instead, SOF not applicable) ---
# CONFIG_SND_SOC_SOF_AMD_COMMON is not set
