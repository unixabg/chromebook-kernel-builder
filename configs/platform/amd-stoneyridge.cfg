# =============================================================================
# PLATFORM CONFIG FRAGMENT: AMD Stoneyridge (GRUNT family)
# Chromebook families: GRUNT
# SOC: AMD A4/A6 9xxx (Bristol Ridge / Stoney Ridge, GCN 3rd gen)
# Boards: aleena, barla, careena, kasumi, kasumi360, treeya, treeya360,
#         apele, liara, nuwani, nuwani360
#
# AUDIO: ACP3x (Audio CoProcessor) + DesignWare I2S
#   DRM_AMD_ACP=y required (built-in for probe ordering)
#   SND_DESIGNWARE_I2S=m (module is correct per working 6.19 config)
#   SND_SOC_AMD_ACP3x=m handles the Stoney audio path
#   SOF is NOT used for Stoneyridge - native ACP driver used instead
#
# VALIDATED AGAINST: working 6.19-rc1 kernel on treeya (Stoneyridge)
# Key findings vs original config:
#   - DRM_AMDGPU=m not =y (module is correct, probe ordering fixed in 6.x)
#   - EXTRA_FIRMWARE="" empty - firmware loaded from filesystem at runtime
#   - SND_DESIGNWARE_I2S=m not =y
#   - DRM_AMD_ACP=y built-in (not module) for audio probe ordering
#   - X86_AMD_PSTATE=y mandatory for proper CPU frequency scaling
#   - X86_AMD_PSTATE_DEFAULT_MODE=3 for performance scaling
#   - Full ACPI processor chain mandatory
#   - Full THERMAL subsystem mandatory
#   - CHROMEOS_ACPI=m mandatory
#   - HZ_250 and PREEMPT_VOLUNTARY match working config
#   - SOF_AMD_RENOIR disabled - native driver used
# =============================================================================

# --- AMD GPU: GCN 3rd gen (Stoney/Bristol Ridge) ---
# =m is correct - working 6.19 config confirmed this
# Probe ordering no longer requires built-in on modern kernels
CONFIG_DRM_AMDGPU=m
CONFIG_DRM_AMDGPU_SI=y
CONFIG_DRM_AMDGPU_CIK=y
CONFIG_DRM_AMDGPU_USERPTR=y

# --- AMD CPU frequency scaling ---
# AMD_PSTATE is the primary driver - replaces ACPI_CPUFREQ for modern AMD
# DEFAULT_MODE=3 = active EPP mode (best performance/efficiency balance)
CONFIG_X86_AMD_PSTATE=y
CONFIG_X86_AMD_PSTATE_DEFAULT_MODE=3
CONFIG_X86_ACPI_CPUFREQ=m
CONFIG_X86_ACPI_CPUFREQ_CPB=y
CONFIG_INTEL_IDLE=y
CONFIG_ACPI_CPU_FREQ_PSS=y

# --- ACPI core ---
CONFIG_ACPI=y
CONFIG_ACPI_LEGACY_TABLES_LOOKUP=y
CONFIG_ACPI_SYSTEM_POWER_STATES_SUPPORT=y
CONFIG_ACPI_TABLE_LIB=y
CONFIG_ACPI_THERMAL_LIB=y
CONFIG_ACPI_SPCR_TABLE=y
CONFIG_ACPI_LPIT=y
CONFIG_ACPI_SLEEP=y
CONFIG_ACPI_REV_OVERRIDE_POSSIBLE=y
CONFIG_ACPI_EC=y
CONFIG_ACPI_EC_DEBUGFS=y
CONFIG_ACPI_AC=m
CONFIG_ACPI_BATTERY=m
CONFIG_ACPI_BUTTON=m
CONFIG_ACPI_VIDEO=m
CONFIG_ACPI_FAN=m
CONFIG_ACPI_TAD=m
CONFIG_ACPI_DOCK=y
CONFIG_ACPI_NHLT=y
CONFIG_ACPI_NFIT=m
CONFIG_ACPI_NUMA=y
CONFIG_ACPI_HMAT=y
CONFIG_ACPI_PCI_SLOT=y
CONFIG_ACPI_CONTAINER=y
CONFIG_ACPI_HOTPLUG_MEMORY=y
CONFIG_ACPI_HOTPLUG_IOAPIC=y
CONFIG_ACPI_SBS=m
CONFIG_ACPI_HED=y
CONFIG_ACPI_BGRT=y
CONFIG_ACPI_WATCHDOG=y
CONFIG_ACPI_EXTLOG=y
CONFIG_ACPI_ADXL=y
CONFIG_ACPI_PCC=y
CONFIG_ACPI_MRRM=y
CONFIG_ACPI_VIOT=y
CONFIG_ACPI_PRMT=y
CONFIG_ACPI_WMI=m
CONFIG_ACPI_ALS=m
CONFIG_ACPI_PLATFORM_PROFILE=m
CONFIG_ACPI_TABLE_UPGRADE=y
CONFIG_ACPI_I2C_OPREGION=y
CONFIG_ACPI_MADT_WAKEUP=y
CONFIG_PNPACPI=y
CONFIG_HOTPLUG_PCI_ACPI=y
CONFIG_ATA_ACPI=y

# --- ACPI processor / C-states / idle ---
CONFIG_ACPI_PROCESSOR=y
CONFIG_ACPI_PROCESSOR_CSTATE=y
CONFIG_ACPI_PROCESSOR_IDLE=y
CONFIG_ACPI_PROCESSOR_AGGREGATOR=m
CONFIG_ACPI_HOTPLUG_CPU=y
CONFIG_ACPI_CPPC_LIB=y
CONFIG_ACPI_THERMAL=y

# --- ACPI error / platform ---
CONFIG_HAVE_ACPI_APEI=y
CONFIG_HAVE_ACPI_APEI_NMI=y
CONFIG_ACPI_APEI=y
CONFIG_ACPI_APEI_GHES=y
CONFIG_ACPI_APEI_PCIEAER=y
CONFIG_ACPI_APEI_MEMORY_FAILURE=y
CONFIG_ACPI_APEI_EINJ=m

# --- Thermal management ---
CONFIG_THERMAL=y
CONFIG_THERMAL_NETLINK=y
CONFIG_THERMAL_STATISTICS=y
CONFIG_THERMAL_EMERGENCY_POWEROFF_DELAY_MS=0
CONFIG_THERMAL_HWMON=y
CONFIG_THERMAL_DEFAULT_GOV_STEP_WISE=y
CONFIG_THERMAL_GOV_FAIR_SHARE=y
CONFIG_THERMAL_GOV_STEP_WISE=y
CONFIG_THERMAL_GOV_BANG_BANG=y
CONFIG_THERMAL_GOV_USER_SPACE=y
CONFIG_THERMAL_GOV_POWER_ALLOCATOR=y
CONFIG_DEVFREQ_THERMAL=y
CONFIG_X86_THERMAL_VECTOR=y
CONFIG_X86_PKG_TEMP_THERMAL=m
CONFIG_INTEL_SOC_DTS_THERMAL=m
CONFIG_INT340X_THERMAL=m
CONFIG_ACPI_THERMAL_REL=m
CONFIG_INT3406_THERMAL=m
CONFIG_PROC_THERMAL_MMIO_RAPL=m
CONFIG_INTEL_BXT_PMIC_THERMAL=m
CONFIG_INTEL_PCH_THERMAL=m
CONFIG_INTEL_HFI_THERMAL=y
CONFIG_POWERCAP=y
CONFIG_ENERGY_MODEL=y

# --- I2C / DesignWare ---
CONFIG_I2C_DESIGNWARE_CORE=y
CONFIG_I2C_DESIGNWARE_PLATFORM=y
CONFIG_I2C_DESIGNWARE_BAYTRAIL=y
CONFIG_I2C_DESIGNWARE_PCI=m
CONFIG_GPIO_ACPI=y
CONFIG_MFD_INTEL_LPSS_ACPI=m
CONFIG_I2C_HID_ACPI=m
CONFIG_MMC_SDHCI_ACPI=m

# --- Chromebook specific ---
CONFIG_CHROMEOS_ACPI=m

# --- Scheduler / timer ---
# Working 6.19 config uses HZ_250 and PREEMPT_VOLUNTARY
CONFIG_HZ_250=y
CONFIG_PREEMPT_VOLUNTARY=y
CONFIG_PREEMPT_DYNAMIC=y
CONFIG_ENERGY_MODEL=y

# --- Audio: AMD ACP (Audio CoProcessor) ---
# DRM_AMD_ACP=y built-in required for audio probe ordering on Stoneyridge
# This is different from AMDGPU itself which is =m
CONFIG_DRM_AMD_ACP=y

# AMD ACP3x is the native Stoney audio driver
CONFIG_SND=y
CONFIG_SND_SOC=y
CONFIG_SND_SOC_ACPI=m
CONFIG_SND_SOC_ACPI_AMD_MATCH=m
CONFIG_SND_SOC_AMD_ACP=m
CONFIG_SND_SOC_AMD_ACP3x=m           # Stoneyridge ACP3x driver
CONFIG_SND_SOC_AMD_CZ_DA7219MX98357_MACH=m
CONFIG_SND_SOC_AMD_CZ_RT5645_MACH=m
CONFIG_SND_AMD_ACP_CONFIG=m
CONFIG_SND_SOC_AMD_ACP_COMMON=m
CONFIG_SND_SOC_AMD_ACP_PDM=m
CONFIG_SND_SOC_AMD_ACP_LEGACY_COMMON=m
CONFIG_SND_SOC_AMD_ACP_I2S=m
CONFIG_SND_SOC_AMD_ACPI_MACH=m
CONFIG_SND_SOC_AMD_ACP_PCM=m
CONFIG_SND_SOC_AMD_ACP_PCI=m
CONFIG_SND_AMD_SOUNDWIRE_ACPI=m
CONFIG_SND_SOC_AMD_ACP_COMMON=m
CONFIG_SND_SOC_AMD_LEGACY_MACH=m
CONFIG_SND_SOC_AMD_MACH_COMMON=m

# --- Audio: DesignWare I2S ---
# =m is correct per working config - not =y
CONFIG_SND_DESIGNWARE_I2S=m

# --- Audio: SOF AMD ---
# SOF Renoir disabled - native ACP driver handles Stoneyridge
# # CONFIG_SND_SOC_SOF_AMD_RENOIR is not set
CONFIG_SND_SOC_SOF_AMD_TOPLEVEL=m
CONFIG_SND_SOC_SOF_AMD_COMMON=m
CONFIG_SND_SOC_SOF_ACP_PROBES=m

# --- Audio: Codecs (Stoneyridge boards use various codecs) ---
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_RT5645=m
CONFIG_SND_SOC_RT5682=m
CONFIG_SND_SOC_NAU8825=m
CONFIG_SND_SOC_CS42L42=m
CONFIG_SND_SOC_DMIC=m

# --- Audio: HDA ---
CONFIG_SND_HDA_INTEL=m
CONFIG_SND_HDA_CODEC_REALTEK=m
CONFIG_SND_INTEL_SOUNDWIRE_ACPI=m
CONFIG_SND_SOC_ACPI_INTEL_MATCH=m
