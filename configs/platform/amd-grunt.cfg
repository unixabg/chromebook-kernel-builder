# AMD GRUNT platform config
# Board: GRUNT family (Aleena, Barla, Careena, Kasumi, Treeya, etc.)
# SoC: AMD A6-9220C / A4-9120C (Stoney Ridge, pre-Zen excavator cores)
# GPU: AMD GCN3 (Radeon R4/R5)
# Audio: AMD ACP with DA7219 + MAX98357A codecs
# WiFi: Intel iwlwifi (covered by base) or Qualcomm ath10k depending on board
#
# NOTE: Very similar SoC to TREEYA360 (stoney-ridge.cfg) but different
# board family with different codec combinations.
#
# DISPLAY: amdgpu must be built-in (=y) - same probe ordering requirement
# as stoney-ridge. Module causes black screen at boot.
#
# PINCTRL: CONFIG_PINCTRL_AMD is critical - GPIO supplier for all I2C
# devices. Without it touchpad, touchscreen, and audio codec all stuck
# at deferred probe pending: waiting_for_supplier.

# ── GPU: AMD GCN3 - MUST be built-in =y ──────────────────────────────────────
CONFIG_DRM_AMDGPU=y
CONFIG_DRM_AMDGPU_SI=y
CONFIG_DRM_AMDGPU_CIK=y
CONFIG_DRM_AMDGPU_USERPTR=y
CONFIG_DRM_AMD_DC=y
CONFIG_DRM_AMD_ACP=y
CONFIG_HSA_AMD=y
# CONFIG_DRM_I915 is not set

# ── Stoney firmware embedded in kernel image ──────────────────────────────────
CONFIG_EXTRA_FIRMWARE="amdgpu/stoney_ce.bin amdgpu/stoney_me.bin amdgpu/stoney_mec.bin amdgpu/stoney_pfp.bin amdgpu/stoney_rlc.bin amdgpu/stoney_sdma.bin amdgpu/stoney_uvd.bin amdgpu/stoney_vce.bin"
CONFIG_EXTRA_FIRMWARE_DIR="/lib/firmware"

# ── CPU frequency: ACPI CPUFreq (pre-Zen AMD) ────────────────────────────────
CONFIG_X86_ACPI_CPUFREQ=y
CONFIG_X86_ACPI_CPUFREQ_CPB=y
# CONFIG_X86_INTEL_PSTATE is not set

# ── GPIO / pinctrl: CRITICAL - supplier for all I2C devices ──────────────────
CONFIG_PINCTRL_AMD=y
CONFIG_GPIO_AMD_FCH=y

# ── I2C: DesignWare core ──────────────────────────────────────────────────────
CONFIG_I2C_DESIGNWARE_CORE=y

# ── Audio: AMD ACP ────────────────────────────────────────────────────────────
CONFIG_SND_SOC_AMD_ACP=m
CONFIG_SND_SOC_AMD_ACP3x=m
CONFIG_SND_SOC_AMD_ACP_COMMON=m
CONFIG_SND_SOC_AMD_MACH_COMMON=m
CONFIG_SND_SOC_AMD_CZ_DA7219MX98357_MACH=m
CONFIG_SND_SOC_AMD_CZ_RT5645_MACH=m
# Codecs on GRUNT boards
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_RT5645=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_DMIC=m
# DesignWare I2S built-in for probe ordering
CONFIG_SND_DESIGNWARE_I2S=y
CONFIG_SND_SOC_DESIGNWARE_I2S=y
# Disable SOF for AMD Stoney (uses ACP path not SOF)
# CONFIG_SND_SOC_SOF_AMD_COMMON is not set

# ── AMD platform ──────────────────────────────────────────────────────────────
CONFIG_AMD_PMC=m
CONFIG_AMD_IOMMU=y
CONFIG_AMD_IOMMU_V2=m
