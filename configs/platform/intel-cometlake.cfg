# Intel CometLake platform config
# Board: HATCH family (Kohaku, Helios, Kindred, Jinlon, etc.)
# SoC: Intel 10th Gen Core (CML-U)
# GPU: Intel Gen10 (i915)
# Audio: Intel SOF CometLake + HDA
# WiFi: Intel iwlwifi (covered by base)

# ── GPU: Intel Gen10 (i915) ───────────────────────────────────────────────────
CONFIG_DRM_I915=y

# ── CPU frequency: Intel P-state ─────────────────────────────────────────────
CONFIG_INTEL_IDLE=y
CONFIG_INTEL_RAPL=m

# ── Audio: SOF CometLake specific options ────────────────────────────────────
# Base covers SOF_COMETLAKE_LP/H/S_SUPPORT and most machine drivers
# These are CometLake-specific additions not in base
CONFIG_SND_SOC_SOF_COMETLAKE=m
CONFIG_SND_SOC_SOF_HDA_LINK_BASELINE=m
# CometLake machine drivers
CONFIG_SND_SOC_INTEL_CML_LP_DA7219_MAX98357_MACH=m
CONFIG_SND_SOC_INTEL_CML_LP_RT5682_MACH=m
# Codecs on HATCH boards
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_RT5682=m
CONFIG_SND_SOC_RT5682S=m
CONFIG_SND_SOC_CS42L42=m
CONFIG_SND_SOC_NAU8825=m

# ── USB-C / power delivery ────────────────────────────────────────────────────
CONFIG_TYPEC=m
CONFIG_TYPEC_UCSI=m
CONFIG_UCSI_ACPI=m
