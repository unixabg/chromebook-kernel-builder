# =============================================================================
# PLATFORM CONFIG FRAGMENT: Intel Comet Lake (Hatch family)
# Chromebook families: HATCH (Kohaku, Helios, Kindred, Jinlon, etc.)
# SOC: Intel 10th Gen Core (CML-U)
# =============================================================================

# --- Intel GPU ---
CONFIG_DRM_I915=y

# --- Audio: SOF Comet Lake ---
CONFIG_SND_SOC_SOF_INTEL_TOPLEVEL=y
CONFIG_SND_SOC_SOF_COMETLAKE=m
CONFIG_SND_SOC_SOF_HDA_LINK_BASELINE=m

# --- AVS (Audio/Video Sync) alternative path for some Hatch boards ---
CONFIG_SND_SOC_INTEL_AVS=m
CONFIG_SND_SOC_INTEL_AVS_MACH_DA7219=m
CONFIG_SND_SOC_INTEL_AVS_MACH_MAX98357A=m
CONFIG_SND_SOC_INTEL_AVS_MACH_MAX98373=m
CONFIG_SND_SOC_INTEL_AVS_MACH_RT5682=m
CONFIG_SND_SOC_INTEL_AVS_MACH_NAU8825=m

# --- Intel Skylake/CML audio DSP ---
CONFIG_SND_SOC_INTEL_SKL=m
CONFIG_SND_SOC_INTEL_APL=m
CONFIG_SND_SOC_INTEL_KBL=m
CONFIG_SND_SOC_INTEL_CML_LP_DA7219_MAX98357_MACH=m
CONFIG_SND_SOC_INTEL_CML_LP_RT5682_MACH=m

# --- Codecs on Hatch ---
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_RT5682=m
CONFIG_SND_SOC_RT5682S=m
CONFIG_SND_SOC_CS42L42=m
CONFIG_SND_SOC_NAU8825=m

# --- Intel power ---
CONFIG_X86_INTEL_LPSS=y
CONFIG_INTEL_IDLE=y
CONFIG_INTEL_RAPL=m
