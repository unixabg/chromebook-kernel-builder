# Intel GeminiLake (GLK) platform config
# Covers: PHASER360 board family
# Devices: Lenovo 500e Gen2, C340, IdeaPad Flex 3, NEC Chromebook Y1
# SoC: Intel Celeron N4100/N4120 (GeminiLake, Atom-derived)
# Audio: Intel SOF + GLK machine drivers (already in base chromebooks-x86_64.cfg)
# WiFi: Intel 9260 (iwlwifi, in base)
# GPU: Intel GEN9 (i915)

# ── GPU ───────────────────────────────────────────────────────────────────────
CONFIG_DRM_I915=m
CONFIG_DRM_I915_GVT=y

# ── CPU frequency ─────────────────────────────────────────────────────────────
# GeminiLake uses P-state driver
CONFIG_X86_INTEL_PSTATE=y
CONFIG_X86_ACPI_CPUFREQ=m

# ── Audio: SOF GeminiLake machine drivers ─────────────────────────────────────
# GLK-specific machine drivers are already in base via SOF_GEMINILAKE_SUPPORT
# and GLK_DA7219/RT5682 machine drivers - no additions needed here

# ── eMMC ──────────────────────────────────────────────────────────────────────
# SDHCI ACPI is in base - GLK uses it for eMMC

# ── USB-C / PD ────────────────────────────────────────────────────────────────
CONFIG_TYPEC=m
CONFIG_TYPEC_UCSI=m
CONFIG_UCSI_ACPI=m
