# AMD Stoney Ridge platform config (TREEYA360)
# Revised to match the uploaded working AMD/AMDGPU settings (module-based AMDGPU)

# ── AMD platform basics (from working config) ────────────────────────────────
CONFIG_X86_AMD_PLATFORM_DEVICE=y
CONFIG_CPU_SUP_AMD=y
CONFIG_X86_MCE_AMD=y
CONFIG_AMD_MEM_ENCRYPT=y
CONFIG_AMD_NUMA=y
CONFIG_AMD_NB=y
CONFIG_AMD_NODE=y

# Working kernel uses amd_pstate
CONFIG_X86_AMD_PSTATE=y
CONFIG_X86_AMD_PSTATE_DEFAULT_MODE=3
CONFIG_X86_AMD_FREQ_SENSITIVITY=m

# To avoid fighting with amd_pstate in a fragment, explicitly disable ACPI CPUFREQ
# (remove these two lines if your build system doesn’t like “is not set” in fragments)
# CONFIG_X86_ACPI_CPUFREQ is not set
# CONFIG_X86_ACPI_CPUFREQ_CPB is not set

# ── GPIO / pinctrl (match working) ──────────────────────────────────────────
CONFIG_PINCTRL_AMD=y
CONFIG_GPIO_AMDPT=m
CONFIG_GPIO_AMD_FCH=m

# ── GPU: AMDGPU (match working: module) ─────────────────────────────────────
CONFIG_DRM_AMDGPU=m
CONFIG_DRM_AMDGPU_SI=y
CONFIG_DRM_AMDGPU_CIK=y
CONFIG_DRM_AMDGPU_USERPTR=y

CONFIG_DRM_AMD_ACP=y

CONFIG_DRM_AMD_DC=y
CONFIG_DRM_AMD_DC_FP=y
CONFIG_DRM_AMD_DC_SI=y

CONFIG_HSA_AMD=y

# ── Audio: ACP / ASoC AMD (match working) ───────────────────────────────────
CONFIG_SND_SOC_AMD_ACP=m
CONFIG_SND_SOC_AMD_ACP3x=m

CONFIG_SND_SOC_AMD_CZ_DA7219MX98357_MACH=m
CONFIG_SND_SOC_AMD_CZ_RT5645_MACH=m

# These are present in the working config; include them to match
CONFIG_SND_SOC_AMD_RV_RT5682_MACH=m
CONFIG_SND_SOC_AMD_RENOIR=m
CONFIG_SND_SOC_AMD_RENOIR_MACH=m
CONFIG_SND_SOC_AMD_ACP5x=m
CONFIG_SND_SOC_AMD_VANGOGH_MACH=m
CONFIG_SND_SOC_AMD_ACP6x=m
CONFIG_SND_SOC_AMD_YC_MACH=m

CONFIG_SND_AMD_ACP_CONFIG=m
CONFIG_SND_SOC_AMD_ACP_COMMON=m
CONFIG_SND_SOC_AMD_ACP_PDM=m
CONFIG_SND_SOC_AMD_ACP_LEGACY_COMMON=m
CONFIG_SND_SOC_AMD_ACP_I2S=m
CONFIG_SND_SOC_AMD_ACPI_MACH=m
CONFIG_SND_SOC_AMD_ACP_PCM=m
CONFIG_SND_SOC_AMD_ACP_PCI=m

CONFIG_SND_AMD_ASOC_RENOIR=m
CONFIG_SND_AMD_ASOC_ACP70=m
CONFIG_SND_SOC_AMD_MACH_COMMON=m
CONFIG_SND_SOC_AMD_LEGACY_MACH=m

# Working config enables these as modules
CONFIG_SND_SOC_AMD_SOF_MACH=m
CONFIG_SND_AMD_SOUNDWIRE_ACPI=m
CONFIG_SND_SOC_AMD_RPL_ACP6x=m
CONFIG_SND_SOC_AMD_ACP63_TOPLEVEL=m
CONFIG_SND_SOC_AMD_SOUNDWIRE_LINK_BASELINE=m
CONFIG_SND_SOC_AMD_PS=m
CONFIG_SND_SOC_AMD_PS_MACH=m

# ── Misc AMD platform bits (match working) ──────────────────────────────────
CONFIG_AMD_PMC=m
CONFIG_AMD_IOMMU=y

