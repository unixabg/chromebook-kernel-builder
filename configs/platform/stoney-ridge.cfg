# Base config for all x86_64 Chromebooks
# Derived from hexdump0815/kernel-config-options chromebooks-x86_64.cfg
# Combined with additional-options-x86_64.cfg
# Applied after defconfig via merge_config.sh
# ── ChromeOS EC & platform ────────────────────────────────────────────────────
CONFIG_CHROMEOS_ACPI=y
# ── IIO / sensors (accelerometer, lid angle, light, baro) ────────────────────
# ── I2C ───────────────────────────────────────────────────────────────────────
CONFIG_I2C_DESIGNWARE_PCI=y
# ── SPI ───────────────────────────────────────────────────────────────────────
CONFIG_SPI_DESIGNWARE=m
# ── Pin control ───────────────────────────────────────────────────────────────
CONFIG_PINCTRL_SX150X=y
# ── MMC / eMMC ────────────────────────────────────────────────────────────────
CONFIG_MMC=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_ACPI=y
# ── TPM ───────────────────────────────────────────────────────────────────────
# ── Input: touchpad / touchscreen ─────────────────────────────────────────────
CONFIG_MOUSE_ELAN_I2C=y
CONFIG_TOUCHSCREEN_ELAN=y
# ── WiFi: Intel iwlwifi ───────────────────────────────────────────────────────
# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_BT_HCI_LE_SPLITTER=y
# ── USB networking ────────────────────────────────────────────────────────────
# ── Camera / media ────────────────────────────────────────────────────────────
CONFIG_MEDIA_SUPPORT=y
CONFIG_MEDIA_SUBDRV_AUTOSELECT=n
CONFIG_VIDEO_AK7375=m
CONFIG_VIDEO_IMX319=m
CONFIG_VIDEO_IMX355=m
# ── ACPI / power ─────────────────────────────────────────────────────────────
CONFIG_ACPI_VIDEO=y
CONFIG_OF=y
# ── Namespaces (required for systemd services: upower, colord, containers) ────
CONFIG_CGROUP_NS=y
# ── Sound: Intel SOF (covers Baytrail/Braswell/GeminiLake/Apollolake) ─────────
CONFIG_SND_DESIGNWARE_PCM=y
CONFIG_SND_SOC_INTEL_HASWELL=m
CONFIG_SND_SIMPLE_CARD=m
# Required to enable SOF on BYT/CHT instead of legacy SST
# CONFIG_SND_SST_ATOM_HIFI2_PLATFORM_ACPI is not set
CONFIG_SND_SOC_INTEL_BAYTRAIL=m
CONFIG_SND_SOC_SOF_ACPI=m
CONFIG_SND_SOC_SOF_OF=m
CONFIG_SND_SOC_SOF_CLIENT_SUPPORT=y
CONFIG_SND_SOC_SOF_APOLLOLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_BAYTRAIL_SUPPORT=y
CONFIG_SND_SOC_SOF_GEMINILAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_CANNONLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_COFFEELAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_ICELAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_COMETLAKE_LP_SUPPORT=y
CONFIG_SND_SOC_SOF_COMETLAKE_H_SUPPORT=y
CONFIG_SND_SOC_SOF_COMETLAKE_S_SUPPORT=y
CONFIG_SND_SOC_SOF_TIGERLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_ELKHARTLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_JASPERLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_HDA_PROBES=y
CONFIG_SND_SOC_SOF_HDA_COMMON_HDMI_CODEC=y
# Intel machine drivers (SOF + SST)
CONFIG_SND_SOC_INTEL_BXT_PCM512x_MACH=m
CONFIG_SND_SOC_INTEL_SOF_PCM512x_MACH=m
CONFIG_SND_SOC_INTEL_SOF_WM8804_MACH=m
CONFIG_SND_SOC_INTEL_SOF_DA7219_MAX98373_MACH=m
CONFIG_SND_SOC_INTEL_EHL_RT5660_MACH=m
CONFIG_SND_SOC_INTEL_SKL_RT286_MACH=m
CONFIG_SND_SOC_INTEL_SKL_NAU88L25_SSM4567_MACH=m
CONFIG_SND_SOC_INTEL_SKL_NAU88L25_MAX98357A_MACH=m
CONFIG_SND_SOC_INTEL_BXT_DA7219_MAX98357A_MACH=m
CONFIG_SND_SOC_INTEL_BXT_RT298_MACH=m
CONFIG_SND_SOC_INTEL_KBL_RT5663_MAX98927_MACH=m
CONFIG_SND_SOC_INTEL_KBL_RT5663_RT5514_MAX98927_MACH=m
CONFIG_SND_SOC_INTEL_KBL_DA7219_MAX98357A_MACH=m
CONFIG_SND_SOC_INTEL_KBL_DA7219_MAX98927_MACH=m
CONFIG_SND_SOC_INTEL_KBL_RT5660_MACH=m
# HDA codecs
# AVS driver (Skylake/Kabylake)
CONFIG_SND_SOC_INTEL_AVS_MACH_I2S_TEST=m
CONFIG_SND_SOC_INTEL_AVS_MACH_MAX98357A=m
CONFIG_SND_SOC_INTEL_AVS_MACH_PROBE=m
CONFIG_SND_SOC_INTEL_AVS_MACH_RT274=m
CONFIG_SND_SOC_INTEL_AVS_MACH_RT298=m
CONFIG_SND_SOC_INTEL_AVS_MACH_RT5682=m
CONFIG_SND_SOC_RT274=m
# ── Virtio (for VM/QEMU testing of kernels before deployment) ─────────────────
CONFIG_VIRTIO_BLK=y
CONFIG_VIRTIO_MMIO=y
CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
# ── Power efficiency ──────────────────────────────────────────────────────────
CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y
# ── Other misc ──────────────────────────────────────────────────────────
