# AMD Stoney Ridge platform config
# Board: TREEYA360
# Devices: Lenovo 300e Chromebook Gen2 AMD (AMD variant)
# SoC: AMD A4-9120C (Stoney Ridge, pre-Zen excavator cores, GCN3 GPU)
#
# AUDIO NOTE: Requires chromebook-linux-audio for UCM/topology/firmware
#   https://github.com/WeirdTreeThing/chromebook-linux-audio
#   Kernel >= 6.19: all ACP patches mainline, no kernel patch needed
#   Kernel 6.12.x: apply patch from chrultrabook.sakamoto.pl/stoneyridge-kernel/patches/
#
# WIFI: Qualcomm Atheros QCA6174 (ath10k)
#
# DISPLAY NOTE: amdgpu MUST be built-in (=y) not module (=m)
#   Stoney Ridge has a probe ordering issue - when amdgpu is a module the
#   display engine fails to initialize and the screen goes black at boot.
#   Built-in ensures the GPU is initialized before the framebuffer handoff.
#
# FIRMWARE NOTE: stoney_*.bin blobs must be available before initrd.
#   Set CONFIG_EXTRA_FIRMWARE to embed them directly in the kernel image.
#   The CI workflow installs linux-firmware before building to provide these.
#
# PINCTRL NOTE: CONFIG_PINCTRL_AMD is critical - it is the GPIO/pinctrl
#   supplier that all I2C devices (touchpad, touchscreen, audio codec) wait
#   for before probing. Without it everything on the I2C buses stays stuck
#   at "deferred probe pending: waiting_for_supplier" indefinitely.

# ── GPU: AMD GCN3 - MUST be built-in =y not module =m ────────────────────────
CONFIG_DRM_AMDGPU=y
CONFIG_DRM_AMDGPU_SI=y
CONFIG_DRM_AMDGPU_CIK=y
CONFIG_DRM_AMDGPU_USERPTR=y
CONFIG_DRM_AMD_DC=y
CONFIG_DRM_AMD_ACP=y
CONFIG_HSA_AMD=y
# CONFIG_DRM_I915 is not set

# ── Stoney firmware embedded in kernel image ──────────────────────────────────
CONFIG_EXTRA_FIRMWARE="amdgpu/stoney_ce.bin amdgpu/stoney_me.bin amdgpu/stoney_mec.bin amdgpu/stoney_pfp.bin amdgpu/stoney_rlc.bin amdgpu/stoney_sdma.bin amdgpu/stoney_uvd.bin amdgpu/stoney_vce.bin"
CONFIG_EXTRA_FIRMWARE_DIR="/lib/firmware"

# ── CPU frequency: ACPI CPUFreq (pre-Zen AMD, not P-state) ───────────────────
CONFIG_X86_ACPI_CPUFREQ=y
CONFIG_X86_ACPI_CPUFREQ_CPB=y
# CONFIG_X86_INTEL_PSTATE is not set

# ── GPIO / pinctrl: CRITICAL - supplier for all I2C devices ──────────────────
# Without PINCTRL_AMD every I2C device (touchpad, touchscreen, audio codec)
# will be stuck at "deferred probe pending: waiting_for_supplier" at boot.
CONFIG_PINCTRL_AMD=y
CONFIG_GPIO_AMD_FCH=y

# ── I2C: DesignWare controller and HID ACPI enumeration ──────────────────────
CONFIG_I2C_DESIGNWARE_CORE=y
CONFIG_I2C_HID_CORE=m

# ── Audio: AMD ACP (Audio CoProcessor) ───────────────────────────────────────
CONFIG_SND_SOC_AMD_ACP=m
CONFIG_SND_SOC_AMD_ACP3x=m
CONFIG_SND_SOC_AMD_ACP_COMMON=m
CONFIG_SND_SOC_AMD_MACH_COMMON=m
CONFIG_SND_SOC_AMD_CZ_DA7219MX98357_MACH=m
CONFIG_SND_SOC_AMD_CZ_RT5645_MACH=m
# Codecs found on TREEYA360
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_RT5645=m
CONFIG_SND_SOC_RT5682=m
CONFIG_SND_SOC_RT5682S=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_DMIC=m
# DesignWare I2S - built-in for probe ordering
CONFIG_SND_DESIGNWARE_I2S=y
CONFIG_SND_SOC_DESIGNWARE_I2S=y
# Disable SOF for AMD Stoney (uses ACP path not SOF)
# CONFIG_SND_SOC_SOF_AMD_COMMON is not set

# ── WiFi: Qualcomm Atheros QCA6174 (ath10k) ──────────────────────────────────
CONFIG_ATH10K=m
CONFIG_ATH10K_PCI=m
CONFIG_ATH10K_DEBUG=y
CONFIG_ATH10K_DEBUGFS=y

# ── USB-C / power delivery ────────────────────────────────────────────────────
CONFIG_TYPEC=m
CONFIG_TYPEC_UCSI=m
CONFIG_UCSI_ACPI=m

# ── eMMC ──────────────────────────────────────────────────────────────────────
CONFIG_MMC_SDHCI_PCI=m

# ── AMD platform ──────────────────────────────────────────────────────────────
CONFIG_AMD_PMC=m
CONFIG_AMD_IOMMU=y
CONFIG_AMD_IOMMU_V2=m
