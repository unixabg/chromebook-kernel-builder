# =============================================================================
# configs/device/esche.cfg
#
# Device overlay for esche - HP Chromebook 11MK G9 EE
# Baseboard: jacuzzi  SoC: MediaTek MT8183
#
# Applied on top of the mainline arm64 defconfig by merge_kernel_config_arm64.sh.
# Options sourced from hexdump0815/kernel-config-options:
#   - mediatek.cfg
#   - chromebooks-aarch64.cfg
#   - additional-options-aarch64.cfg
# =============================================================================

# ── Version string ────────────────────────────────────────────────────────────
# Prevent kernel from appending a dirty '+' suffix to the version string
# CONFIG_LOCALVERSION_AUTO is not set

# ── I2C / SPI built-in ────────────────────────────────────────────────────────
# Hexdump requires these built-in (=y) not as modules.
# EC communicates over SPI - if SPI is a module it cannot be loaded before EC init.
CONFIG_I2C_MT65XX=y
CONFIG_SPI_MT65XX=y

# ── PMIC / Regulators ─────────────────────────────────────────────────────────
# MT8183 uses MT6358 PMIC. Without these the SoC cannot manage power rails
# and will fail to bring up display, CPU frequency scaling, and more.
CONFIG_MFD_MT6397=y
CONFIG_REGULATOR_MT6358=y
CONFIG_REGULATOR_MT6397=y
CONFIG_REGULATOR_DA9211=y
CONFIG_MTK_PMIC_WRAP=y

# ── MediaTek core subsystems ──────────────────────────────────────────────────
# IOMMU required for display/GPU DMA.
# CMDQ is the display engine command queue - DRM_MEDIATEK depends on it.
# Without these the display will not initialize.
CONFIG_MTK_IOMMU=y
CONFIG_MTK_CMDQ=y
CONFIG_MTK_EFUSE=y
CONFIG_MTK_THERMAL=y

# ── Display / PWM ─────────────────────────────────────────────────────────────
CONFIG_DRM_PANEL_SIMPLE=y
CONFIG_DRM_GENERIC_GPIO_MUX=y
CONFIG_DRM_ANALOGIX_ANX7688=y
CONFIG_DRM_PARADE_PS8640=y
CONFIG_DRM_MEDIATEK_HDMI=y
CONFIG_PWM_MTK_DISP=y
CONFIG_PWM_MEDIATEK=y

# ── USB ───────────────────────────────────────────────────────────────────────
CONFIG_USB_MTU3=y
CONFIG_PHY_MTK_TPHY=y

# ── ChromeOS EC ───────────────────────────────────────────────────────────────
CONFIG_CROS_EC_RPMSG=y
CONFIG_CHARGER_CROS_USBPD=m

# ── Audio ─────────────────────────────────────────────────────────────────────
# DA7219 headset codec on esche
CONFIG_SND_SOC_DA7219=m

# ── WiFi ──────────────────────────────────────────────────────────────────────
# QCA6174A on SDIO
CONFIG_ATH10K=m
CONFIG_ATH10K_SDIO=m

# ── Input ─────────────────────────────────────────────────────────────────────
CONFIG_TOUCHSCREEN_ATMEL_MXT_T37=y
CONFIG_TOUCHSCREEN_ELAN=m
CONFIG_MOUSE_ELAN_I2C=m
CONFIG_MOUSE_ELAN_I2C_I2C=y

# ── CPU idle ──────────────────────────────────────────────────────────────────
# Without these the CPUs never enter idle states - causes thermal issues
# and excess battery drain. PSCI coordinates idle with firmware.
CONFIG_DT_IDLE_STATES=y
CONFIG_ARM_CPUIDLE=y
CONFIG_ARM_PSCI_CPUIDLE=y
CONFIG_ARM_PSCI_CPUIDLE_DOMAIN=y

# ── ARM64 crypto acceleration ─────────────────────────────────────────────────
CONFIG_CRYPTO_AES_ARM64_NEON_BLK=y
CONFIG_CRYPTO_CHACHA20_NEON=y
CONFIG_CRYPTO_NHPOLY1305_NEON=y
CONFIG_CRYPTO_AES_ARM64_BS=y

# ── Power efficient workqueues ────────────────────────────────────────────────
CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y

# ── btrfs built-in ────────────────────────────────────────────────────────────
# velvet-os uses btrfs root - must be built-in since there is no initramfs
CONFIG_BTRFS_FS=y
