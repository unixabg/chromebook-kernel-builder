# =============================================================================
# configs/device/esche.cfg
#
# Device overlay for esche - HP Chromebook 11MK G9 EE
# Baseboard: jacuzzi  SoC: MediaTek MT8183
#
# Applied on top of whatever mainline defconfig was selected by
# merge_kernel_config_arm64.sh (mt8183_defconfig > mediatek_defconfig >
# defconfig). Add options here that the mainline defconfig does not cover,
# or that are specific to esche and not correct for other kukui boards.
#
# Audio codec path on esche: DA7219 (headset) + MAX98357A (speaker)
# WiFi: QCA6174A on SDIO (ath10k_sdio)
# =============================================================================

# DA7219 headset codec
CONFIG_SND_SOC_DA7219=m

# ath10k SDIO for QCA6174A
CONFIG_ATH10K=m
CONFIG_ATH10K_SDIO=m
