# =============================================================================
# configs/device/esche.cfg
#
# Device overlay for esche - HP Chromebook 11MK G9 EE
# Baseboard: jacuzzi  SoC: MediaTek MT8183
# DA7219 + MAX98357A
# =============================================================================
# MT8183 core platform
CONFIG_SND_SOC_MEDIATEK=m
CONFIG_SND_SOC_MT8183=m

# Machine drivers (both needed for jacuzzi/esche)
CONFIG_SND_SOC_MT8183_MT6358_TS3A227E_MAX98357A=m
CONFIG_SND_SOC_MT8183_DA7219_MAX98357A=m

# Codec drivers
CONFIG_SND_SOC_MT6358=m
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_RT1015=m
CONFIG_SND_SOC_RT1015P=m
CONFIG_SND_SOC_TS3A227E=m
CONFIG_SND_SOC_DMIC=m

# Support/infrastructure
CONFIG_MFD_MT6397=y
CONFIG_SND_SOC_BT_SCO=m
CONFIG_SND_SOC_HDMI_CODEC=y

