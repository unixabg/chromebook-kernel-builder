# =============================================================================
# DEVICE CONFIG FRAGMENT: setzer
# Board: HP Chromebook 11 G5 EE
# Platform: Intel Braswell (inherits intel-braswell.cfg)
# Baseboard: strago
# Codec: Realtek RT5650 (chtrt5650)
#
# Notes:
#   - Mic issues reported (sizzling sound) when recording - this is a known
#     issue with the RT5650 on setzer. WeirdTreeThing setup-audio installs
#     the correct UCM config which includes mic gain adjustments.
#   - See: github.com/WeirdTreeThing/chromebook-linux-audio/issues/76
# =============================================================================

CONFIG_SND_SOC_RT5645=m

# MAX98090 not present on this board
# CONFIG_SND_SOC_MAX98090 is not set
