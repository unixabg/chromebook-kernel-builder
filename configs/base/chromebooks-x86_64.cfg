# ── Virtio (for VM/QEMU testing of kernels before deployment) ─────────────────
CONFIG_VIRTIO_BLK=y
CONFIG_DRM_VIRTIO_GPU=m
CONFIG_VIRTIO_PCI_LIB=y
CONFIG_VIRTIO_PCI_LIB_LEGACY=y
CONFIG_VIRTIO_MENU=y
