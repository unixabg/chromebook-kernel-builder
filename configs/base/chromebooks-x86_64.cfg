# Base config for all x86_64 Chromebooks
# Derived from hexdump0815/kernel-config-options chromebooks-x86_64.cfg
# Combined with additional-options-x86_64.cfg
# Applied after defconfig via merge_config.sh

# ── ChromeOS EC & platform ────────────────────────────────────────────────────
CONFIG_CHROME_PLATFORMS=y
CONFIG_CHROMEOS_ACPI=y
CONFIG_CHROMEOS_LAPTOP=m
CONFIG_CHROMEOS_PSTORE=m
CONFIG_CHROMEOS_TBMC=m
CONFIG_CROS_EC=m
CONFIG_CROS_EC_I2C=m
CONFIG_CROS_EC_ISHTP=m
CONFIG_CROS_EC_SPI=m
CONFIG_CROS_EC_LPC=m
CONFIG_CROS_KBD_LED_BACKLIGHT=m
CONFIG_RTC_DRV_CROS_EC=m
CONFIG_CHARGER_CROS_USBPD=m
CONFIG_CHARGER_WILCO=m
CONFIG_WILCO_EC=m
CONFIG_WILCO_EC_DEBUGFS=m
CONFIG_WILCO_EC_EVENTS=m
CONFIG_WILCO_EC_TELEMETRY=m

# ── IIO / sensors (accelerometer, lid angle, light, baro) ────────────────────
CONFIG_IIO=m
CONFIG_IIO_CROS_EC_ACCEL_LEGACY=m
CONFIG_IIO_CROS_EC_SENSORS_CORE=m
CONFIG_IIO_CROS_EC_SENSORS=m
CONFIG_IIO_CROS_EC_SENSORS_LID_ANGLE=m
CONFIG_IIO_CROS_EC_LIGHT_PROX=m
CONFIG_IIO_CROS_EC_BARO=m

# ── I2C ───────────────────────────────────────────────────────────────────────
CONFIG_X86_INTEL_LPSS=y
CONFIG_I2C_DESIGNWARE_PLATFORM=y
CONFIG_I2C_DESIGNWARE_PCI=y
CONFIG_I2C_DESIGNWARE_BAYTRAIL=y
CONFIG_I2C_CROS_EC_TUNNEL=m
CONFIG_I2C_HID=m
CONFIG_INTEL_ISH_HID=m
CONFIG_MFD_INTEL_LPSS_PCI=m
CONFIG_MFD_INTEL_LPSS_ACPI=m

# ── SPI ───────────────────────────────────────────────────────────────────────
CONFIG_SPI=y
CONFIG_SPI_DESIGNWARE=m
CONFIG_SPI_PXA2XX=m
CONFIG_SPI_PXA2XX_PCI=m

# ── Pin control ───────────────────────────────────────────────────────────────
CONFIG_PINCTRL_SX150X=y
CONFIG_PINCTRL_BAYTRAIL=y
CONFIG_PINCTRL_CHERRYVIEW=y

# ── MMC / eMMC ────────────────────────────────────────────────────────────────
CONFIG_MMC=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_ACPI=y

# ── TPM ───────────────────────────────────────────────────────────────────────
CONFIG_TCG_TPM=y
CONFIG_TCG_TIS_CORE=y
CONFIG_TCG_TIS=y

# ── Input: touchpad / touchscreen ─────────────────────────────────────────────
CONFIG_MOUSE_ELAN_I2C=y
CONFIG_MOUSE_ELAN_I2C_I2C=y
CONFIG_TOUCHSCREEN_ELAN=y
CONFIG_TOUCHSCREEN_ATMEL_MXT=m
CONFIG_HID_MULTITOUCH=m

# ── WiFi: Intel iwlwifi ───────────────────────────────────────────────────────
CONFIG_IWLWIFI=m
CONFIG_IWLMVM=m
CONFIG_IWLDVM=m

# ── Bluetooth ─────────────────────────────────────────────────────────────────
CONFIG_BT=m
CONFIG_BT_HCIBFUSB=m
CONFIG_BT_HCIBTUSB=m
CONFIG_BT_HCIVHCI=m
CONFIG_BT_HIDP=m
CONFIG_BT_RFCOMM=m
CONFIG_BT_ATH3K=m
CONFIG_BT_HCIBCM203X=m
CONFIG_BT_HCI_LE_SPLITTER=y

# ── USB networking ────────────────────────────────────────────────────────────
CONFIG_USB_USBNET=m
CONFIG_USB_RTL8152=m

# ── Camera / media ────────────────────────────────────────────────────────────
CONFIG_MEDIA_SUPPORT=y
CONFIG_MEDIA_CAMERA_SUPPORT=y
CONFIG_MEDIA_USB_SUPPORT=y
CONFIG_MEDIA_CONTROLLER=y
CONFIG_MEDIA_PCI_SUPPORT=y
CONFIG_VIDEO_V4L2_SUBDEV_API=y
CONFIG_USB_VIDEO_CLASS=m
CONFIG_STAGING=y
CONFIG_STAGING_MEDIA=y
CONFIG_MEDIA_SUBDRV_AUTOSELECT=n
CONFIG_VIDEO_AK7375=m
CONFIG_VIDEO_IMX319=m
CONFIG_VIDEO_IMX355=m
CONFIG_VIDEO_IPU3_CIO2=m
CONFIG_VIDEO_IPU3_IMGU=m

# ── ACPI / power ─────────────────────────────────────────────────────────────
CONFIG_ACPI_VIDEO=y
CONFIG_OF=y
CONFIG_EEPROM_AT24=m

# ── Namespaces (required for systemd services: upower, colord, containers) ────
CONFIG_USER_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y
CONFIG_IPC_NS=y
CONFIG_UTS_NS=y
CONFIG_CGROUP_NS=y

# ── Sound: Intel SOF (covers Baytrail/Braswell/GeminiLake/Apollolake) ─────────
CONFIG_SND_OSSEMUL=y
CONFIG_SND_DUMMY=m
CONFIG_SND_SOC=m
CONFIG_SND_DESIGNWARE_I2S=m
CONFIG_SND_DESIGNWARE_PCM=y
CONFIG_SND_SOC_INTEL_HASWELL=m
CONFIG_SND_SOC_CROS_EC_CODEC=m
CONFIG_SND_SIMPLE_CARD=m
# Required to enable SOF on BYT/CHT instead of legacy SST
# CONFIG_SND_SST_ATOM_HIFI2_PLATFORM_ACPI is not set
CONFIG_SND_SOC_INTEL_BAYTRAIL=m
CONFIG_SND_SOC_SOF_TOPLEVEL=y
CONFIG_SND_SOC_SOF_PCI=m
CONFIG_SND_SOC_SOF_ACPI=m
CONFIG_SND_SOC_SOF_OF=m
CONFIG_SND_SOC_SOF_CLIENT_SUPPORT=y
CONFIG_SND_SOC_SOF_INTEL_TOPLEVEL=y
CONFIG_SND_SOC_SOF_APOLLOLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_BAYTRAIL_SUPPORT=y
CONFIG_SND_SOC_SOF_GEMINILAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_CANNONLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_COFFEELAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_ICELAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_COMETLAKE_LP_SUPPORT=y
CONFIG_SND_SOC_SOF_COMETLAKE_H_SUPPORT=y
CONFIG_SND_SOC_SOF_COMETLAKE_S_SUPPORT=y
CONFIG_SND_SOC_SOF_TIGERLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_ELKHARTLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_JASPERLAKE_SUPPORT=y
CONFIG_SND_SOC_SOF_HDA_PROBES=y
CONFIG_SND_SOC_SOF_HDA_LINK=y
CONFIG_SND_SOC_SOF_HDA_AUDIO_CODEC=y
CONFIG_SND_SOC_SOF_HDA_COMMON_HDMI_CODEC=y
CONFIG_SND_SOC_INTEL_USER_FRIENDLY_LONG_NAMES=y
# Intel machine drivers (SOF + SST)
CONFIG_SND_SOC_INTEL_BDW_RT5650_MACH=m
CONFIG_SND_SOC_INTEL_BDW_RT5677_MACH=m
CONFIG_SND_SOC_INTEL_BROADWELL_MACH=m
