# =============================================================================
# BASE KERNEL CONFIG FRAGMENT: chromebooks-x86_64.cfg
# Inspired by hexdump0815/kernel-config-options/chromebooks-x86_64.cfg
# Applied first; platform and device fragments layer on top via merge_config.sh
# =============================================================================

# --- Chromebook boot / verified boot stubs ---
CONFIG_CHROME_PLATFORMS=y
CONFIG_CHROMEOS_TBMC=m
CONFIG_CROS_EC=y
CONFIG_CROS_EC_I2C=m
CONFIG_CROS_EC_SPI=m
CONFIG_CROS_EC_LPC=m
CONFIG_CROS_EC_PROTO=y
CONFIG_CROS_KBD_LED_BACKLIGHT=m
CONFIG_CROS_EC_TYPEC=m
CONFIG_CROS_USBPD_NOTIFY=m
CONFIG_CROS_HPS_I2C=m

# --- USB-C / PD ---
CONFIG_TYPEC=y
CONFIG_TYPEC_UCSI=m
CONFIG_UCSI_ACPI=m
CONFIG_TYPEC_DP_ALTMODE=m

# --- Input (touchpad, touchscreen) ---
CONFIG_MOUSE_PS2=y
CONFIG_MOUSE_PS2_ELANTECH=y
CONFIG_MOUSE_PS2_SYNAPTICS=y
CONFIG_MOUSE_PS2_SYNAPTICS_SMBUS=y
CONFIG_TOUCHSCREEN_ATMEL_MXT=m
CONFIG_TOUCHSCREEN_ELAN=m
CONFIG_I2C_HID_ACPI=m
CONFIG_HID_MULTITOUCH=m

# --- SPI (needed for some touchpads/ECs) ---
CONFIG_SPI=y
CONFIG_SPI_INTEL_PLATFORM=m

# --- MMC / eMMC ---
CONFIG_MMC=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_ACPI=y
CONFIG_MMC_SDHCI_PCI=y

# --- NVMe (some newer boards) ---
CONFIG_NVME_CORE=y
CONFIG_BLK_DEV_NVME=y

# --- WiFi (Intel AX series common on x86 Chromebooks) ---
CONFIG_IWLWIFI=m
CONFIG_IWLMVM=m
CONFIG_IWLDVM=m
CONFIG_ATH10K=m
CONFIG_ATH10K_PCI=m

# --- Bluetooth ---
CONFIG_BT=m
CONFIG_BT_HCIBTUSB=m
CONFIG_BT_INTEL=m

# --- Graphics: Intel ---
CONFIG_DRM=y
CONFIG_DRM_I915=y

# --- Graphics: Generic/DisplayPort ---
CONFIG_DRM_PANEL_SIMPLE=m
CONFIG_DRM_PARADE_PS8640=m
CONFIG_DRM_ANALOGIX_ANX78XX=m
CONFIG_DRM_CROS_EC_ANX7688=m
CONFIG_DRM_TI_SN65DSI86=m

# --- Audio: ALSA core ---
CONFIG_SOUND=y
CONFIG_SND=m
CONFIG_SND_HDA=m
CONFIG_SND_HDA_INTEL=m
CONFIG_SND_HDA_CODEC_REALTEK=m
CONFIG_SND_HDA_CODEC_CONEXANT=m
CONFIG_SND_HDA_CODEC_HDMI=m
CONFIG_SND_HDA_I915=y

# --- Audio: SOF (Sound Open Firmware) - core ---
CONFIG_SND_SOC=m
CONFIG_SND_SOC_SOF=m
CONFIG_SND_SOC_SOF_PCI=m
CONFIG_SND_SOC_SOF_HDA=m
CONFIG_SND_SOC_SOF_HDA_LINK=y
CONFIG_SND_SOC_SOF_HDA_AUDIO_CODEC=y
CONFIG_SND_SOC_SOF_DEVELOPER_SUPPORT=y
CONFIG_SND_SOC_INTEL_USER_FRIENDLY_LONG_NAMES=y

# --- Audio: DMIC (required for internal mic on most Chromebooks) ---
CONFIG_SND_SOC_DMIC=m
CONFIG_SND_SOC_INTEL_SOUNDWIRE_SOF_MACH=m

# --- Audio: Codecs common across Chromebook generations ---
CONFIG_SND_SOC_MAX98357A=m
CONFIG_SND_SOC_MAX98373=m
CONFIG_SND_SOC_MAX98390=m
CONFIG_SND_SOC_DA7219=m
CONFIG_SND_SOC_RT5514=m
CONFIG_SND_SOC_RT5663=m
CONFIG_SND_SOC_RT5682=m
CONFIG_SND_SOC_RT5682S=m
CONFIG_SND_SOC_NAU8825=m
CONFIG_SND_SOC_CS42L42=m
CONFIG_SND_SOC_CS35L41=m

# --- Power management ---
CONFIG_ACPI=y
CONFIG_ACPI_EC_DEBUGFS=m
CONFIG_X86_INTEL_LPSS=y
CONFIG_PMIC_OPREGION=y
CONFIG_CHT_WC_PMIC_OPREGION=y

# --- Battery / charging ---
CONFIG_POWER_SUPPLY=y
CONFIG_BATTERY_BQ27XXX=m
CONFIG_CHARGER_CROS_USBPD=m

# --- Misc ---
CONFIG_LEDS_CLASS=y
CONFIG_LEDS_BRIGHTNESS_HW_CHANGED=y
CONFIG_BACKLIGHT_CLASS_DEVICE=y
CONFIG_BACKLIGHT_INTEL_PANEL=y

# --- Filesystem essentials ---
CONFIG_EXT4_FS=y
CONFIG_BTRFS_FS=m
CONFIG_VFAT_FS=y
CONFIG_EXFAT_FS=m

# --- Security: TPM (cr50/ti50) ---
CONFIG_TCG_TPM=y
CONFIG_TCG_CR50_I2C=m
CONFIG_TCG_TIS_SPI=m

# --- Firmware loading ---
CONFIG_FW_LOADER=y
CONFIG_FW_LOADER_USER_HELPER=y
CONFIG_FW_LOADER_COMPRESS=y
CONFIG_FW_LOADER_COMPRESS_ZSTD=y
