# =============================================================================
# configs/base/arm64-common-fixes.cfg
#
# Config options required for ARM64 Chromebook builds that may not be
# explicitly set in upstream base configs.
#
# Applied to all ARM64 platforms after olddefconfig.
# =============================================================================

# Required by panel-ilitek-ili9882t (MT8192/MT8195 panel driver built as
# module in hexdump configs). Became an explicit dependency in 7.0 —
# previously auto-selected as a hidden dep in 6.12 and earlier.
CONFIG_DRM_DISPLAY_DSC_HELPER=y
