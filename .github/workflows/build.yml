name: Build Chromebook Kernels

on:
  # Run weekly on Sunday at 02:00 UTC to pick up new kernel point releases
  schedule:
    - cron: '0 2 * * 0'

  # Run on push to main when commit message contains [build:platform] or [build:all]
  push:
    branches: [ main ]

  # Allow manual trigger with optional kernel version override
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel series override (e.g. 6.6 or 6.12), leave blank for default'
        required: false
        default: ''
      platform_filter:
        description: 'Build only this platform (e.g. geminilake), leave blank for all'
        required: false
        default: ''

jobs:
  # ============================================================
  # Resolve the kernel version once, share across all matrix jobs
  # ============================================================
  resolve-version:
    name: Resolve kernel version
    runs-on: ubuntu-24.04
    outputs:
      kernel_series: ${{ steps.resolve.outputs.kernel_series }}
      kernel_full: ${{ steps.resolve.outputs.kernel_full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve kernel version
        id: resolve
        run: |
          # Priority order:
          #   1. [kernel:x.y.z] or [kernel:x.y] tag in commit message
          #   2. workflow_dispatch kernel_version input
          #   3. DEFAULT_SERIES from kernel_versions.conf
          KERNEL_TAG=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            KERNEL_TAG=$(echo '${{ toJson(github.event.commits) }}' | \
              grep -oP '(?<=\[kernel:)[0-9]+\.[0-9]+(\.[0-9]+)?(?=\])' | head -1 || true)
            [[ -n "$KERNEL_TAG" ]] && echo "Kernel override from commit tag: $KERNEL_TAG"
          fi

          if [[ -n "$KERNEL_TAG" ]]; then
            SERIES="$KERNEL_TAG"
          elif [[ -n "${{ github.event.inputs.kernel_version }}" ]]; then
            SERIES="${{ github.event.inputs.kernel_version }}"
          else
            SERIES=$(grep "^DEFAULT_SERIES=" configs/kernel_versions.conf | cut -d= -f2)
          fi

          echo "Kernel series: $SERIES"
          echo "kernel_series=$SERIES" >> "$GITHUB_OUTPUT"

          # Resolve latest point release in this series
          FULL=$(curl -s --max-time 15 "https://www.kernel.org/releases.json" | \
            grep -o '"version": *"[0-9]*\.[0-9]*\.[0-9]*"' | \
            grep -o '"[0-9]*\.[0-9]*\.[0-9]*"' | \
            tr -d '"' | \
            grep "^${SERIES}\." | \
            sort -t. -k1,1n -k2,2n -k3,3n | \
            tail -1)

          # If SERIES was a full version (e.g. 6.19.6), use it directly
          if [[ -z "$FULL" && "$SERIES" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            FULL="$SERIES"
            echo "Using exact version from tag: $FULL"
          fi

          if [[ -z "$FULL" ]]; then
            echo "ERROR: Could not resolve latest ${SERIES}.x from kernel.org"
            exit 1
          fi
          echo "Resolved: linux-$FULL"
          echo "kernel_full=$FULL" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Build matrix - one job per platform
  # ============================================================
  build:
    name: Build ${{ matrix.platform }}
    needs: resolve-version
    runs-on: ubuntu-24.04

    strategy:
      # Don't cancel all jobs if one platform fails
      fail-fast: false
      matrix:
        include:
          # Intel platforms
          #- platform: geminilake
          #  codename: geminilake
          #- platform: intel-braswell
          #  codename: intel-braswell
          #- platform: intel-cometlake
          #  codename: intel-cometlake
          #- platform: intel-tigerlake
          #  codename: intel-tigerlake
          #- platform: intel-alderlake
          #  codename: intel-alderlake
          # AMD platforms
          - platform: stoney-ridge
            codename: stoney-ridge
          #- platform: amd-grunt
          #  codename: amd-grunt
          #- platform: amd-ryzen-zork
          #  codename: amd-ryzen-zork
          #- platform: amd-mendocino
          #  codename: amd-mendocino

    steps:
      - name: Check platform filter
        id: check_filter
        run: |
          # schedule: always build all
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_dispatch: respect platform_filter input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FILTER="${{ github.event.inputs.platform_filter }}"
            if [[ -z "$FILTER" || "$FILTER" == "all" || "$FILTER" == "${{ matrix.platform }}" ]]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # push: require [build:target] or [build:all] in commit message
          BUILD_TAG=$(echo '${{ toJson(github.event.commits) }}' | \
            grep -oP '(?<=\[build:)[^\]]+' | head -1 || true)

          if [[ -z "$BUILD_TAG" ]]; then
            echo "No [build:*] tag in commit message - skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_TAG" == "all" || "$BUILD_TAG" == "${{ matrix.platform }}" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if not targeted
        if: steps.check_filter.outputs.skip == 'true'
        run: echo "Skipping ${{ matrix.platform }} - not targeted by this build"

      - name: Checkout
        if: steps.check_filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # Cache the kernel source tarball - keyed by full version
      # Saves ~140MB download on repeat runs for same version
      # --------------------------------------------------------
      - name: Cache kernel tarball
        if: steps.check_filter.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: /var/tmp/kernel-tarballs
          key: kernel-tarball-${{ needs.resolve-version.outputs.kernel_full }}

      # --------------------------------------------------------
      # Cache ccache - keyed by platform + series
      # Falls back to any previous cache for this platform
      # --------------------------------------------------------
      - name: Cache ccache
        if: steps.check_filter.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_full }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_series }}.
            ccache-${{ matrix.platform }}-

      # --------------------------------------------------------
      # Install build dependencies
      # --------------------------------------------------------
      - name: Install build dependencies
        if: steps.check_filter.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            libdw-dev \
            dwarves pahole debhelper rsync \
            kmod wget curl git xz-utils ccache \
            zstd

      # --------------------------------------------------------
      # Platform-specific firmware prerequisites
      # --------------------------------------------------------
      - name: Install platform firmware
        if: steps.check_filter.outputs.skip != 'true'
        run: |
          case "${{ matrix.platform }}" in
            stoney-ridge|amd-grunt|amd-ryzen-zork|amd-mendocino)
              # Ubuntu: linux-firmware contains amdgpu blobs
              sudo apt-get install -y linux-firmware
              # Decompress stoney firmware blobs if present as .zst
              for f in /lib/firmware/amdgpu/stoney_*.bin.zst; do
                [[ -f "${f%.zst}" ]] && continue
                sudo zstd -d "$f" -o "${f%.zst}" 2>/dev/null || true
              done
              # If still missing, download directly from linux-firmware git
              MISSING=()
              for blob in ce me mec pfp rlc sdma uvd vce; do
                [[ ! -f "/lib/firmware/amdgpu/stoney_${blob}.bin" ]] && \
                  MISSING+=("stoney_${blob}.bin")
              done
              if [[ ${#MISSING[@]} -gt 0 ]]; then
                echo "Downloading missing blobs: ${MISSING[*]}"
                for blob in "${MISSING[@]}"; do
                  sudo wget -q \
                    "https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/amdgpu/${blob}" \
                    -O "/lib/firmware/amdgpu/${blob}"
                done
              fi
              echo "Stoney firmware present:"
              ls /lib/firmware/amdgpu/stoney_*.bin 2>/dev/null || echo "  (none - stoney-only check skipped for non-stoney AMD)"
              ;;
            geminilake|intel-*)
              # Ubuntu: linux-firmware covers iwlwifi and SOF DSP firmware
              sudo apt-get install -y linux-firmware
              ;;
          esac

      # --------------------------------------------------------
      # Download kernel source (uses cache if available)
      # --------------------------------------------------------
      - name: Download kernel source
        if: steps.check_filter.outputs.skip != 'true'
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          mkdir -p /var/tmp/kernel-tarballs
          TARBALL="/var/tmp/kernel-tarballs/linux-${KERNEL_FULL}.tar.xz"
          if [[ ! -f "$TARBALL" ]]; then
            MAJOR="${KERNEL_FULL%%.*}"
            echo "Downloading linux-${KERNEL_FULL}.tar.xz..."
            wget -q -O "$TARBALL" \
              "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${KERNEL_FULL}.tar.xz"
          else
            echo "Using cached tarball: $TARBALL"
          fi

          echo "Extracting..."
          mkdir -p /var/tmp/kernel-build
          tar -xf "$TARBALL" -C /var/tmp/kernel-build
          echo "Source ready: /var/tmp/kernel-build/linux-${KERNEL_FULL}"

      # --------------------------------------------------------
      # Apply patches
      # --------------------------------------------------------
      - name: Apply patches
        if: steps.check_filter.outputs.skip != 'true'
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          sudo chown -R "$USER:$USER" "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          PATCH_DIR="patches/${{ matrix.platform }}"
          SRCDIR="/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          cd "$SRCDIR"
          if [[ -d "${GITHUB_WORKSPACE}/${PATCH_DIR}" ]]; then
            shopt -s nullglob
            patches=("${GITHUB_WORKSPACE}/${PATCH_DIR}"/*.patch)
            if [[ ${#patches[@]} -gt 0 ]]; then
              echo "Applying ${#patches[@]} patch(es)..."
              for p in "${patches[@]}"; do
                echo "  $(basename "$p")"
                patch -p1 --forward < "$p" || \
                  echo "WARNING: patch $(basename "$p") did not apply cleanly"
              done
            else
              echo "No .patch files in $PATCH_DIR"
            fi
          else
            echo "No patch directory for ${{ matrix.platform }}"
          fi

      # --------------------------------------------------------
      # Merge kernel config
      # --------------------------------------------------------
      - name: Merge kernel config
        if: steps.check_filter.outputs.skip != 'true'
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
        run: |
          sudo chown -R "$USER:$USER" "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          chmod +x scripts/merge_kernel_config.sh
          BASE_CFG="defconfig"
          if [[ "${{ matrix.platform }}" == "stoney-ridge" ]]; then
            BASE_CFG="${GITHUB_WORKSPACE}/configs/base/6.19.0-rc1.cfg"
          fi
          scripts/merge_kernel_config.sh \
            --kernel-src "/var/tmp/kernel-build/linux-${KERNEL_FULL}" \
            --codename "${{ matrix.codename }}" \
            --platform "${{ matrix.platform }}" \
            --base-config "$BASE_CFG"

      # --------------------------------------------------------
      # Build kernel .deb packages with ccache
      # --------------------------------------------------------
      - name: Build kernel
        if: steps.check_filter.outputs.skip != 'true'
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
          CODENAME: ${{ matrix.codename }}
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -s

          LOCAL_VERSION="-chromebook-${CODENAME}"
          FULL_PKG_VERSION="${KERNEL_FULL}${LOCAL_VERSION}"

          cd "/var/tmp/kernel-build/linux-${KERNEL_FULL}"
          time make ARCH=x86_64 \
            CC="ccache gcc" \
            LOCALVERSION="${LOCAL_VERSION}" \
            KDEB_PKGVERSION="${FULL_PKG_VERSION}-1" \
            KDEB_COMPRESS="xz" \
            INSTALL_MOD_STRIP=1 \
            bindeb-pkg \
            -j$(nproc)

          ccache -s
          echo "FULL_PKG_VERSION=${FULL_PKG_VERSION}" >> "$GITHUB_ENV"

      # --------------------------------------------------------
      # Generate APT pin file
      # --------------------------------------------------------
      - name: Generate APT pin file
        if: steps.check_filter.outputs.skip != 'true'
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
          CODENAME: ${{ matrix.codename }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          mkdir -p output
          chmod +x scripts/install_apt_pin.sh
          scripts/install_apt_pin.sh \
            --generate \
            "${KERNEL_FULL}-chromebook-${CODENAME}" \
            "${CODENAME}" \
            "${PLATFORM}" \
            "output/99-chromebook-kernel-${CODENAME}"

      # --------------------------------------------------------
      # Collect output files
      # --------------------------------------------------------
      - name: Collect output
        if: steps.check_filter.outputs.skip != 'true'
        env:
          KERNEL_FULL: ${{ needs.resolve-version.outputs.kernel_full }}
          CODENAME: ${{ matrix.codename }}
        run: |
          mkdir -p output
          find /var/tmp/kernel-build -maxdepth 1 -name "*.deb" \
            -exec cp {} output/ \;
          echo "Output files:"
          ls -lh output/

      # --------------------------------------------------------
      # Upload as workflow artifact
      # --------------------------------------------------------
      - name: Upload artifacts
        if: steps.check_filter.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.platform }}-${{ needs.resolve-version.outputs.kernel_full }}
          path: output/
          retention-days: 30

  # ============================================================
  # Create a GitHub Release with all platform artifacts combined
  # Only runs on scheduled and workflow_dispatch triggers
  # ============================================================
  release:
    name: Create release
    needs: [ resolve-version, build ]
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: kernel-*
          merge-multiple: true

      - name: Show release contents
        run: ls -lh release-files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.kernel_full }}-chromebook
          name: "Chromebook Kernels - linux-${{ needs.resolve-version.outputs.kernel_full }}"
          body: |
            ## Chromebook OS Custom Chromebook Kernels

            Kernel version: **linux-${{ needs.resolve-version.outputs.kernel_full }}**
            Built: ${{ github.run_id }}

            ### Platforms included
            | Kernel package | Board family | Devices | Notes |
            |---|---|---|---|
            | linux-image-*-chromebook-geminilake | PHASER360 | Lenovo 500e Gen2, C340, Flex 3, NEC Y1 | Intel SOF audio |
            | linux-image-*-chromebook-intel-braswell | STRAGO | Gnawty, Relm, Setzer, etc. | CHT SST audio |
            | linux-image-*-chromebook-intel-cometlake | HATCH | Kohaku, Helios, etc. | SOF CML |
            | linux-image-*-chromebook-intel-tigerlake | VOLTEER | Voxel, Delbin, etc. | SOF TGL + SoundWire |
            | linux-image-*-chromebook-intel-alderlake | BRYA | Constitution, Vell, etc. | SOF ADL + SoundWire |
            | linux-image-*-chromebook-stoney-ridge | TREEYA360 | Lenovo 300e Gen2 AMD | ACP audio, needs chromebook-linux-audio |
            | linux-image-*-chromebook-amd-grunt | GRUNT | Aleena, Barla, Careena, etc. | ACP audio |
            | linux-image-*-chromebook-amd-ryzen-zork | ZORK | Morphius, Dalboz, Vilboz, etc. | SOF/ACP audio |
            | linux-image-*-chromebook-amd-mendocino | SKYRIM | Mordin, Grunt2, etc. | SOF audio |

            ### Installation
            ```bash
            # Find your board codename
            cat /sys/class/dmi/id/board_name

            # Look up your platform in hardware_map.conf:
            # https://github.com/unixabg/chromebook-kernel-builder/blob/main/configs/hardware_map.conf

            # Install kernel (replace PLATFORM with your platform name)
            PLATFORM=geminilake
            sudo dpkg -i linux-image-*-chromebook-${PLATFORM}*.deb \
                         linux-headers-*-chromebook-${PLATFORM}*.deb

            # Pin to prevent apt upgrades overwriting this kernel
            sudo cp 99-chromebook-kernel-${PLATFORM} /etc/apt/preferences.d/
            sudo apt-mark hold linux-image-*-chromebook-${PLATFORM}

            # Reboot, then set up audio if needed
            git clone https://github.com/WeirdTreeThing/chromebook-linux-audio
            cd chromebook-linux-audio && sudo ./setup-audio
            ```

            ### Audio notes
            - **stoney-ridge**: Requires `chromebook-linux-audio` for UCM/topology files.
              On kernel < 6.19 an additional patch is needed - see `patches/stoney-ridge/`.
            - All other platforms: audio should work out of the box after `setup-audio`.
          files: release-files/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
